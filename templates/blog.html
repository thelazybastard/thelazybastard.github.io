{% extends "base.html" %}

{% block content %}
<article>
  <div class="back-arrow-div"><a href="/blogs" class="back-arrow" aria-label="Back to blogs">&#8592; Blogs</a></div>
  <h1 class="child-title">{{ page.title }}</h1>
  <h2>{{ page.description }}</h2>
  <div class="content">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
