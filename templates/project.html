{% extends "base.html" %}

{% block content %}
<article>
  <h1 class="child-title">{{ page.title }}</h1>
  <h2>{{ page.description }}</h2>

  {% if page.extra.tech %}
  <ul class="tech-stack" id="individual-stack">
    {% for tech in page.extra.tech %}
    <li>{{ tech }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  <div class="content">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
