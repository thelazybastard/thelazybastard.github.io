{% extends "base.html" %}

{% block content %}
<article>
  <div class="back-arrow-div"><a href="/projects" class="back-arrow" aria-label="Back to projects">&#8592; Projects</a></div>
  <h1 class="child-title">{{ page.title }}</h1>
  <h2>{{ page.description }}</h2>

  {% if page.extra.tech %}
  <ul class="tech-stack" id="individual-stack">
    {% for tech in page.extra.tech %}
    <li>{{ tech }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  <div class="content">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
