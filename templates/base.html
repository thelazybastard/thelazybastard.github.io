<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monish's Portfolio</title>
    <link rel="stylesheet" href="{{ get_url(path='css/styles.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Share+Tech+Mono&display=swap" rel="stylesheet">


</head>
<body>
    <div class="header">

                <!-- Desktop -->
        <pre id="ascii-desktop"></pre>

        <!-- Mobile -->
        <pre id="ascii-mobile"></pre>

        <script>
        const desktop =
` _   _          _                 _               _                _ 
| |_| |__   ___| | __ _ _____   _| |__   __ _ ___| |_ __ _ _ __ __| |
| __| '_ \\ / _ \\ |/ _\` |_  / | | | '_ \\ / _\` / __| __/ _\` | '__/ _\` |
| |_| | | |  __/ | (_| |/ /| |_| | |_) | (_| \\__ \\ || (_| | | | (_| |
\\__|_| |_|\\___|_|\\__,_/___|\\__, |_.__/ \\__,_|___/\\__\\__,_|_|  \\__,_|
                            |___/                                    `;

        const mobile = 
` _   _          _                 
| |_| |__   ___| | __ _ _____   _ 
| __| '_ \\ / _ \\ |/ _\` |_  / | | |
| |_| | | |  __/ | (_| |/ /| |_| |
\\__|_| |_|\\___|_|\\__,_/___|\\__, |
                            |___/ 
 _               _                _ 
| |__   __ _ ___| |_ __ _ _ __ __| |
| '_ \\ / _\` / __| __/ _\` | '__/ _\` |
| |_) | (_| \\__ \\ || (_| | | | (_| |
|_.__/ \\__,_|___/\\__\\__,_|_|  \\__,_|`;

        function typewrite(el, text, speed = 12) {
        el.textContent = ''; // ← clear before replaying
        let i = 0;
        const timer = setInterval(() => {
            el.textContent += text[i++];
            if (i >= text.length) clearInterval(timer);
        }, speed);
        }

        function playDesktopAnimation() {
        document.getElementById('ascii-mobile').textContent = '';
        typewrite(document.getElementById('ascii-desktop'), desktop);
        }

        function playMobileAnimation() {
        document.getElementById('ascii-desktop').textContent = '';
        typewrite(document.getElementById('ascii-mobile'), mobile);
        }

        // Initial load
        let currentMode = window.innerWidth <= 768 ? 'mobile' : 'desktop';
        currentMode === 'mobile' ? playMobileAnimation() : playDesktopAnimation();

        // Resize — only fires logic on breakpoint cross
        window.addEventListener('resize', () => {
        const newMode = window.innerWidth <= 768 ? 'mobile' : 'desktop';
        if (newMode !== currentMode) {
            currentMode = newMode;
            newMode === 'mobile' ? playMobileAnimation() : playDesktopAnimation();
        }
        });
        </script>


        <nav class="nav-navigation-container">
            <a href="{{ get_url(path='/') }}" class="nav-navigation">Home</a>
            <a href="/about/" class="nav-navigation">About</a>
            <a href="/projects/" class="nav-navigation">Projects</a>   
            <a href="/stack" class="nav-navigation">Stack</a>     
            <a href="/blogs" class="nav-navigation">Blogs</a>
        </nav>
    </div>

    
    <div class="main">
        {% block content %} {% endblock content %}
    </div>

    <footer class="footer">
        &copy; {{ now() | date(format="%Y") }} {{ config.extra.author }} {{ config.extra.copyright }}
    </footer>

</body>
</html>
